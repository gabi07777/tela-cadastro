<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/register.css">
    <title>Tela de Cadastro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="container">

        <form class="formulario">
            <h1>Cadastro</h1>

            <label class="usuario">Usúario</label>
            <div class="icone">
                <i class="fa-regular fa-user"></i>
                <input type="text" placeholder="Digite seu nome de usúario">
            </div>

            <label class="email">E-mail</label>
            <div class="icone">
                <i class="fa-regular fa-envelope"></i>
                <input type="text" placeholder="nome@email.com">
            </div>

            <label class="senha">Senha</label>
            <div class="icone">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Digite sua senha">
            </div>

            <button class="cadastro">Cadastrar</button>

            <p class="login">Já tem uma conta? <a href="">Fazer Login</a></p>
        </form>

    </div>
</body>

</html>
